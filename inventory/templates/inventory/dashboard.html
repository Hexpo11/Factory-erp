{% extends "inventory/base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h2>Dashboard</h2>

<div style="display: flex; gap: 20px; margin-top: 20px;">

    <div style="background:white; padding:20px; border-radius:6px; width:200px;">
        <h3>Total Materials</h3>
        <p style="font-size:24px;">{{ total_materials }}</p>
    </div>

    <div style="background:white; padding:20px; border-radius:6px; width:200px;">
        <h3>Low Stock</h3>
        <p style="font-size:24px; color:red;">{{ low_stock }}</p>
    </div>

    <div style="background:white; padding:20px; border-radius:6px; width:200px;">
        <h3>Production Orders</h3>
        <p style="font-size:24px;">{{ total_orders }}</p>
    </div>

</div>
{% endblock %}
