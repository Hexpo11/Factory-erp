{% extends "dashboard/base.html" %}

{% block content %}
<style>
    .form-box {
        max-width: 420px;
        margin: 60px auto;
        padding: 30px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    label {
        font-weight: bold;
        margin-top: 15px;
        display: block;
    }
    input {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
    }
    button {
        width: 100%;
        margin-top: 25px;
        padding: 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
    }
</style>

<div class="form-box">
    <h2>Edit Material</h2>

    <form method="post">
        {% csrf_token %}

        <label>Name</label>
        <input type="text" name="name" value="{{ material.name }}" required>

        <label>Quantity</label>
        <input type="number" name="quantity" value="{{ material.quantity }}" required>

        <label>Low Stock Limit</label>
        <input type="number" name="min_quantity" value="{{ material.min_quantity }}" required>

        <button type="submit">Update</button>
    </form>
</div>
{% endblock %}
