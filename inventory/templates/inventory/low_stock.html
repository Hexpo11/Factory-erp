{% extends "dashboard/base.html" %}

{% block content %}
<h2 style="text-align:center;margin-top:30px;">Low Stock Materials ⚠️</h2>

<table border="1" cellpadding="10" cellspacing="0" style="margin:30px auto;">
    <tr>
        <th>Name</th>
        <th>Quantity</th>
        <th>Low Stock Limit</th>
    </tr>

    {% for m in materials %}
    <tr style="background:#ffe4e6;">
        <td>{{ m.name }}</td>
        <td>{{ m.quantity }}</td>
        <td>{{ m.min_quantity }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No low stock items 🎉</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
