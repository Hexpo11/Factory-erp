<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Factory ERP{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 15px 30px;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav {
            background: #374151;
            padding: 10px 30px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #e5e7eb;
        }

        .btn {
            display: inline-block;
            padding: 8px 14px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<header>
    <h1>🏭 Factory ERP</h1>
</header>

<nav>
    <a href="/">Dashboard</a>
    <a href="/inventory/">Inventory</a>
</nav>


<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
