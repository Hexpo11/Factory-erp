{% extends "dashboard/base.html" %}

{% block content %}
<style>
    .form-container {
        max-width: 420px;
        margin: 60px auto;
        padding: 30px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
    }
    input {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    button {
        width: 100%;
        margin-top: 25px;
        padding: 12px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
    }
</style>

<div class="form-container">
    <h2>Add Material</h2>

    <form method="post">
        {% csrf_token %}

        <label>Material Name</label>
        <input type="text" name="name" required>

        <label>Quantity</label>
        <input type="number" name="quantity" required>

        <label>Low Stock Alert Value</label>
        <input type="number" name="min_quantity" placeholder="e.g. 10" required>

        <button type="submit">Save Material</button>
    </form>
</div>
{% endblock %}
