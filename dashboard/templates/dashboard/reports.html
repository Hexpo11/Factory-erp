<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reports | Factory ERP</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6fa;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">Factory ERP</a>
    <div>
        <a href="/" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <a href="/inventory/" class="btn btn-outline-light btn-sm">Inventory</a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="fw-bold mb-4">📊 Reports</h2>

    <div class="row g-4">

        <!-- Inventory Report -->
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">📦 Inventory Report</h5>
                    <p class="text-muted">
                        View all materials and stock levels.
                    </p>
                    <a href="/inventory/" class="btn btn-primary w-100">
                        Open Inventory
                    </a>
                </div>
            </div>
        </div>

        <!-- Low Stock -->
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">⚠️ Low Stock</h5>
                    <p class="text-muted">
                        Items running below safe stock level.
                    </p>
                    <a href="/" class="btn btn-warning w-100">
                        View Dashboard
                    </a>
                </div>
            </div>
        </div>

        <!-- Future -->
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">🏭 Production</h5>
                    <p class="text-muted">
                        Production and usage analytics.
                    </p>
                    <button class="btn btn-secondary w-100" disabled>
                        Coming Soon
                    </button>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
